---
version: "3"

tasks:
  default:
    silent: true
    desc: Show all tasks
    cmds:
      - |-
        if [ $(command -v "go-task") ]; then
          go-task --list-all
        else
          task --list-all
        fi

  check:
    desc: Run all linters, type checkers
    cmds:
      - task: lint
      - task: typing

  ci:install:
    desc: Install with uv (locked)
    cmds:
      - uv sync --locked --all-extras

  ci:test:
    desc: Run pytest with coverage
    cmds:
      - uv run -m
        pytest --verbose --cov --cov-config=pyproject.toml --cov-report=xml

  clean:
    desc: Remove virtualenv and cache files
    cmds:
      - rm -rf
        .coverage
        .mypy_cache
        .pytest_cache
        .ruff_cache
        .venv
        coverage.xml
        dist
        htmlcov
        site
      - find {{ .TASK_DIR }} -type d -name "__pycache__" -exec rm -r {} +

  cov:
    desc: Run coverage
    cmds:
      - uv run -m coverage erase
      - uv run -m coverage run -m pytest
      - uv run -m coverage report
      - uv run -m coverage html
      - uv run -m webbrowser "htmlcov/index.html"

  docs:serve:
    desc: Serve docs
    cmds:
      - uv run -m mkdocs serve

  docs:test:
    desc: Test docs build
    cmds:
      - uv run -m mkdocs build --strict

  docs:view:
    desc: Test docs build
    cmds:
      - uv run -m webbrowser "http://127.0.0.1:8000/"

  docs:requirements-txt:
    desc: Create or update docs/requirements.txt
    cmds:
      - uv export
        --no-hashes
        --format requirements-txt
        --no-editable
        --output-file docs/requirements.txt

  git:check:
    desc: Check if git repo is clean
    cmds:
      - test -z "$(git status --porcelain)"
        || { echo "[Error] Git repository has uncommitted changes.
        Please commit or stash them first." && false; }

  lint:
    desc: Run formatter & linter
    cmds:
      - uv run ruff format --diff
      - uv run ruff check

  install:
    desc: Sync virtualenv with `uv`
    cmds:
      - uv sync

  fresh:
    desc: Clean and install
    cmds:
      - task: clean
      - task: install

  pkg:list:
    desc: Show installed Python packages
    cmds:
      - uv pip list -q
        | tail -n+3
        | fzf --multi --preview-window=down --preview 'uv pip show {1}'

  test:
    desc: Run pytest with forwarded args in uv
    cmds:
      - uv run -m pytest {{ .CLI_ARGS }}

  typing:
    desc: Run type checker
    cmds:
      - uvx ty check --python .venv src

  version:
    desc: Show version
    silent: true
    cmds:
      - uv version --short

  bump:
    desc: "Bump version (task bump -- patch|minor|major)"
    cmds:
      - uv version --bump {{ .CLI_ARGS }}

  release:
    desc: "Release (task release -- patch|minor|major): bump, commit, tag, push"
    cmds:
      - task: git:check
      - uv version --bump {{ .CLI_ARGS }}
      - git add pyproject.toml uv.lock
      - 'git commit -m "chore: bump version to $(uv version --short)"'
      - git tag -a "$(uv version --short)" -m "$(uv version --short)"
      - git push --follow-tags
